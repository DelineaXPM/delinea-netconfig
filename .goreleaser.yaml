# Docker images
dockers:
  - image_templates:
      - "ghcr.io/delineaxpm/delinea-netconfig:{{ .Version }}-amd64"
      - "ghcr.io/delineaxpm/delinea-netconfig:latest-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.description=Convert Delinea network requirements to various firewall and IaC formats"
      - "--label=org.opencontainers.image.source=https://github.com/DelineaXPM/delinea-netconfig"
      - "--label=org.opencontainers.image.licenses=MIT"

  - image_templates:
      - "ghcr.io/delineaxpm/delinea-netconfig:{{ .Version }}-arm64"
      - "ghcr.io/delineaxpm/delinea-netconfig:latest-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.description=Convert Delinea network requirements to various firewall and IaC formats"
      - "--label=org.opencontainers.image.source=https://github.com/DelineaXPM/delinea-netconfig"
      - "--label=org.opencontainers.image.licenses=MIT"

# Docker manifests for multi-arch images
docker_manifests:
  - name_template: ghcr.io/delineaxpm/delinea-netconfig:{{ .Version }}
    image_templates:
      - ghcr.io/delineaxpm/delinea-netconfig:{{ .Version }}-amd64
      - ghcr.io/delineaxpm/delinea-netconfig:{{ .Version }}-arm64

  - name_template: ghcr.io/delineaxpm/delinea-netconfig:latest
    image_templates:
      - ghcr.io/delineaxpm/delinea-netconfig:latest-amd64
      - ghcr.io/delineaxpm/delinea-netconfig:latest-arm64

# Announce release
announce:
  skip: '{{gt .Patch 0}}'  # Only announce major/minor releases
