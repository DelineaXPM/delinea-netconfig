# GoReleaser configuration for delinea-netconfig
# https://goreleaser.com

version: 2

project_name: delinea-netconfig

before:
  hooks:
    # Ensure dependencies are up to date
    - go mod tidy
    # Run tests before building
    - go test ./...

builds:
  - id: delinea-netconfig
    main: ./cmd/delinea-netconfig
    binary: delinea-netconfig

    # Build for multiple platforms
    goos:
      - linux
      - darwin
      - windows
      - freebsd

    goarch:
      - amd64
      - arm64
      - 386
      - arm

    # ARM variants
    goarm:
      - "6"
      - "7"

    # Ignore certain combinations
    ignore:
      - goos: darwin
        goarch: 386
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64

    # Inject version information at build time
    ldflags:
      - -s -w
      - -X github.com/DelineaXPM/delinea-netconfig/internal/cli.Version={{.Version}}
      - -X github.com/DelineaXPM/delinea-netconfig/internal/cli.Commit={{.Commit}}
      - -X github.com/DelineaXPM/delinea-netconfig/internal/cli.Date={{.Date}}

    env:
      - CGO_ENABLED=0

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

    # Format based on OS (tar.gz for Unix, zip for Windows)
    format_overrides:
      - goos: windows
        format: zip

    # Files to include in the archive
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - docs/**/*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Performance Improvements'
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: 'Documentation'
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: Others
      order: 999

release:
  github:
    owner: DelineaXPM
    name: delinea-netconfig

  # Release name template
  name_template: "delinea-netconfig {{.Version}}"

  # Create draft release (requires manual publish)
  draft: false

  # Mark as prerelease if version contains -rc, -beta, -alpha
  prerelease: auto

  # Release footer
  footer: |
    ## Installation

    ### Using Installation Script (Linux/macOS)
    ```bash
    curl -sfL https://raw.githubusercontent.com/DelineaXPM/delinea-netconfig/main/install.sh | sh
    ```

    ### Binary Downloads
    Download the appropriate binary for your platform from the assets below.

    ### Using Docker
    ```bash
    # Fetch live (no local file needed)
    docker run --rm ghcr.io/delineaxpm/delinea-netconfig:{{ .Version }} \
      convert -u https://setup.delinea.app/network-requirements --format csv

    # Convert a local file (must exist in current directory)
    docker run --rm -v "$(pwd):/data" ghcr.io/delineaxpm/delinea-netconfig:{{ .Version }} \
      convert -f /data/network-requirements.json --format csv
    ```

    ### Verify Installation
    ```bash
    delinea-netconfig version
    ```

    ---

    **Full Changelog**: https://github.com/DelineaXPM/delinea-netconfig/compare/{{ .PreviousTag }}...{{ .Tag }}

